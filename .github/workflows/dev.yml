name: Development CI

on:
  push:
    branches:
      - dev
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: development-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate development
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check formatting
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

      - name: Upload development build
        uses: actions/upload-artifact@v7
        with:
          name: taskflow-dev-${{ github.sha }}
          path: dist
          if-no-files-found: error
          retention-days: 7
